<!doctype html>
<html lang="ko">
  <head>
    <meta charset="UTF-8" />
    <title>Emozzk Lite</title>
    <link rel="stylesheet" href="./popup.css" />
    <script src="./popup.js" defer></script>
  </head>
  <body>
    <main class="popup">
      <header class="popup-header">
        <strong class="popup-title">Emozzk Lite</strong>
        <span class="popup-version"></span>
      </header>
      <section class="popup-section">
        <div class="popup-section-header">
          <div class="popup-section-heading">
            <h2 class="popup-section-title">단축키 세트 수</h2>
            <p class="popup-section-description">
              이모티콘 패널 툴바에 표시할 단축키 세트 개수를 정합니다.
            </p>
          </div>

          <strong
            id="shortcutSetCountValue"
            class="popup-range-value"
            aria-live="polite"
          >
            2개
          </strong>
        </div>

        <input
          id="shortcutSetCountRange"
          class="popup-range"
          type="range"
          min="1"
          max="9"
          step="1"
          value="2"
        />

        <div class="popup-range-meta">
          <span>1개</span>
          <span>9개</span>
        </div>
        <div class="popup-shortcut-settings">
          <div class="popup-shortcut-settings-header">
            <strong class="popup-shortcut-settings-title">
              세트 전환 단축키
            </strong>

            <p class="popup-section-description">
              이전 또는 다음 단축키 세트로 전환합니다.
            </p>
          </div>

          <div class="popup-shortcut-setting">
            <span class="popup-shortcut-setting-label">
              이전 세트
            </span>

            <div class="popup-shortcut-setting-controls">
              <button
                id="previousShortcutSetButton"
                class="popup-shortcut-key-button"
                type="button"
              >
                미지정
              </button>

              <button
                id="previousShortcutSetClearButton"
                class="popup-shortcut-clear-button"
                type="button"
                aria-label="이전 세트 단축키 해제"
                title="단축키 해제"
                hidden
              >
                <!-- Clear icon will be inserted here -->
              </button>
            </div>
          </div>

          <div class="popup-shortcut-setting">
            <span class="popup-shortcut-setting-label">
              다음 세트
            </span>

            <div class="popup-shortcut-setting-controls">
              <button
                id="nextShortcutSetButton"
                class="popup-shortcut-key-button"
                type="button"
              >
                미지정
              </button>

              <button
                id="nextShortcutSetClearButton"
                class="popup-shortcut-clear-button"
                type="button"
                aria-label="다음 세트 단축키 해제"
                title="단축키 해제"
                hidden
              >
								<!-- Clear icon will be inserted here -->
              </button>
            </div>
          </div>
        </div>
      </section>

      <section class="popup-section">
        <div class="popup-section-header">
          <div class="popup-section-heading">
            <h2 class="popup-section-title">최근 이모티콘 보존 개수</h2>
            <p class="popup-section-description">
              치지직 최근 이모티콘 목록을 확장해 최대 몇 개까지 유지할지 정합니다.
            </p>
          </div>

          <strong
            id="recentStorageLimitValue"
            class="popup-range-value"
            aria-live="polite"
          >
            60개
          </strong>
        </div>

        <input
          id="recentStorageLimitRange"
          class="popup-range"
          type="range"
          min="0"
          max="5"
          step="1"
          value="2"
        />

        <div class="popup-range-meta">
          <span>20개</span>
          <span>200개</span>
        </div>
      </section>

      <section class="popup-section">
        <h2 class="popup-section-title">실험실</h2>

        <label class="popup-check" for="experimentalKeyupEnabled">
          <input id="experimentalKeyupEnabled" type="checkbox" />
          <span>
            KeyUp 단축키 허용
            <small>키를 뗄 때 이모티콘 입력을 사용할 수 있게 합니다.</small>
          </span>
        </label>

        <label class="popup-check" for="experimentalBothPhaseEnabled">
          <input id="experimentalBothPhaseEnabled" type="checkbox" />
          <span>
            KeyDown+KeyUp 동시 지정 허용
            <small>KeyUp 허용이 켜져 있을 때만 사용할 수 있습니다.</small>
          </span>
        </label>

        <label
          class="popup-check"
          for="experimentalQuickInsertPanelHidden"
        >
          <input
            id="experimentalQuickInsertPanelHidden"
            type="checkbox"
          />
          <span>
            단축키 입력 시 이모티콘 패널 숨기기
            <small>
              패널이 닫혀 있을 때 단축키로 자동 여는 패널을 화면에 표시하지 않습니다.
            </small>
          </span>
        </label>
      </section>

      <p id="statusText" class="popup-status" aria-live="polite"></p>
    </main>
  </body>
</html>
